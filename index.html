<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط المحترف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.98); }
        #qrcode-canvas { margin: 0 auto; min-height: 260px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div id="app" class="glass-card p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-white/20">
        
        <div id="main-content">
            <div class="text-5xl mb-4">🔗</div>
            <h1 class="text-2xl font-black text-slate-800 mb-6">مختصر الروابط و QR</h1>

            <div class="space-y-4">
                <input type="url" id="longUrl" placeholder="أدخل الرابط الطويل..." 
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-right outline-none focus:border-blue-500 transition-all">
                
                <input type="text" id="customSlug" placeholder="اسم الرابط (اختياري)" 
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-right outline-none focus:border-blue-500 transition-all">

                <input type="text" id="logoUrl" placeholder="رابط صورة اللوجو (اختياري)" 
                       class="w-full p-3 bg-slate-100 border-2 border-transparent rounded-xl text-left dir-ltr outline-none focus:border-blue-500 text-sm">

                <button id="shortenBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">
                    توليد الرابط والـ QR 🚀
                </button>
            </div>

            <div id="resultArea" class="hidden mt-8 space-y-6">
                <div class="p-4 bg-blue-50 border border-blue-100 rounded-2xl">
                    <div class="bg-white p-3 rounded-xl border border-blue-200 shadow-inner flex items-center justify-between gap-2">
                        <a id="shortLink" href="#" target="_blank" class="text-blue-600 font-bold break-all text-sm underline flex-1 text-left"></a>
                        <button onclick="copyToClipboard()" class="text-xs bg-blue-600 text-white px-3 py-2 rounded-lg">نسخ</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <div id="qrcode-canvas"></div>
                    <button id="downloadBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md transition-all">
                        تنزيل الصورة 📥
                    </button>
                </div>
            </div>
        </div>

        <div id="redirect-screen" class="hidden py-12 text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600 mx-auto"></div>
            <p class="mt-6 text-slate-800 font-bold text-lg italic">جاري التحويل...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGhCAU7DLleD1KkCR6SQmvl8bpDncHJ8g",
            authDomain: "planning-with-ai-797ec.firebaseapp.com",
            projectId: "planning-with-ai-797ec",
            databaseURL: "https://planning-with-ai-797ec-default-rtdb.firebaseio.com",
            storageBucket: "planning-with-ai-797ec.firebasestorage.app",
            messagingSenderId: "283439580292",
            appId: "1:283439580292:web:b566dc267bdb8861ca2ed1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const shortenBtn = document.getElementById('shortenBtn');
        const qrcodeContainer = document.getElementById("qrcode-canvas");

        shortenBtn.addEventListener('click', async () => {
            const originalUrl = document.getElementById('longUrl').value.trim();
            const logoUrl = document.getElementById('logoUrl').value.trim();
            let slug = document.getElementById('customSlug').value.trim();

            if (!originalUrl) return alert("ضع الرابط أولاً!");
            if (!slug) slug = Math.random().toString(36).substring(2, 8);

            try {
                await set(ref(db, 'links/' + slug), { target: originalUrl });
                const finalLink = window.location.origin + window.location.pathname + "?" + slug;
                
                document.getElementById('shortLink').innerText = finalLink;
                document.getElementById('shortLink').href = finalLink;
                document.getElementById('resultArea').classList.remove('hidden');

                // مسح أي كود سابق
                qrcodeContainer.innerHTML = "";

                // إعداد الـ QR بشكل صحيح ومستقر
                const qrCode = new QRCodeStyling({
                    width: 260,
                    height: 260,
                    data: finalLink,
                    image: logoUrl,
                    dotsOptions: { color: "#0f172a", type: "rounded" },
                    backgroundOptions: { color: "#ffffff" },
                    imageOptions: { 
                        crossOrigin: "anonymous", 
                        margin: 10, 
                        imageSize: 0.4 // حجم اللوجو 40%
                    }
                });

                qrCode.append(qrcodeContainer);

                // التنزيل التلقائي
                setTimeout(() => {
                    qrCode.download({ name: slug, extension: "png" });
                    document.getElementById('downloadBtn').onclick = () => qrCode.download({ name: slug, extension: "png" });
                }, 1000);

            } catch (e) {
                alert("حدث خطأ! تأكد من إعدادات قاعدة البيانات.");
            }
        });

        // نظام التوجيه
        window.onload = async () => {
            const slug = window.location.search.substring(1);
            if (slug) {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('redirect-screen').classList.remove('hidden');
                const snapshot = await get(child(ref(db), `links/${slug}`));
                if (snapshot.exists()) {
                    window.location.href = snapshot.val().target;
                } else {
                    window.location.href = window.location.origin + window.location.pathname;
                }
            }
        };
    </script>

    <script>
        function copyToClipboard() {
            const linkText = document.getElementById('shortLink').innerText;
            navigator.clipboard.writeText(linkText).then(() => alert("تم النسخ!"));
        }
    </script>
</body>
</html>
