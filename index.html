<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH5Tji4WfG5r2d_T0XAd2LBBNB28t2dhFqJAcbR5JSpyMqqNB6IbugiC2Vos-2smWIa3tMpA7kEHf3iMcHSsbmkZUw9I1AwP-ocTRnlzLDJWjCb8eH5m2cRXiWpIa-O6a1bOSdyB9hUg-FepVa9QPjTs8Co6nX0_GDnednjERDFmN1quZbkIbW5wQjh2I/s1024/103777.png">
    <title>مختصر الروابط الاحترافي | elgoharyx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.98); }
        #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 12px; }
        .hexagon-img {
            width: 150px; height: 150px; margin: 10px auto 20px auto; display: block;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            object-fit: cover; filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.1));
        }
        .dir-ltr { direction: ltr; text-align: left; }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-6">

    <div id="app" class="glass-card p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <div id="main-content">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH5Tji4WfG5r2d_T0XAd2LBBNB28t2dhFqJAcbR5JSpyMqqNB6IbugiC2Vos-2smWIa3tMpA7kEHf3iMcHSsbmkZUw9I1AwP-ocTRnlzLDJWjCb8eH5m2cRXiWpIa-O6a1bOSdyB9hUg-FepVa9QPjTs8Co6nX0_GDnednjERDFmN1quZbkIbW5wQjh2I/s1024/103777.png" class="hexagon-img" alt="elgoharyx Logo">
            <h1 class="text-xl md:text-2xl font-black text-slate-800 mb-6">اختصار روابط / elgoharyX</h1>

            <div class="space-y-4">
                <input type="url" id="longUrl" placeholder="أدخل الرابط الطويل (https://...)" 
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-right outline-none focus:border-blue-500 transition-all">
                
                <input type="text" id="customSlug" placeholder="الاسم المخصص (اختياري)" 
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-right outline-none focus:border-blue-500 transition-all">

                <button id="shortenBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span id="btnText">إنشاء الرابط و QR كود</span>
                    <div id="btnLoader" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                </button>
            </div>

            <div id="resultArea" class="hidden mt-8 space-y-6 border-t border-slate-100 pt-6">
                <div class="p-4 bg-blue-50 border border-blue-100 rounded-2xl text-right">
                    <label class="block text-slate-500 text-xs mb-2">الرابط المختصر الفريد:</label>
                    <div class="bg-white p-3 rounded-xl border border-blue-200 shadow-inner flex items-center justify-between gap-2">
                        <a id="shortLink" href="#" target="_blank" class="text-blue-600 font-bold break-all text-sm underline dir-ltr flex-1"></a>
                        <button onclick="copyToClipboard()" class="text-xs bg-blue-100 hover:bg-blue-200 text-blue-800 px-3 py-2 rounded-lg font-medium">نسخ</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="block text-slate-700 font-bold text-sm text-right">كود QR للرابط:</label>
                    <div id="qrcode"></div>
                    <button id="downloadBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
                        <span>تحميل صورة QR</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="redirect-screen" class="hidden py-16 text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600 mx-auto"></div>
            <p class="mt-8 text-slate-800 font-bold text-xl">جاري تحويلك بأمان...</p>
            <p class="text-slate-500 mt-2 text-sm">بواسطة elgoharyx</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGhCAU7DLleD1KkCR6SQmvl8bpDncHJ8g",
            authDomain: "planning-with-ai-797ec.firebaseapp.com",
            projectId: "planning-with-ai-797ec",
            databaseURL: "https://planning-with-ai-797ec-default-rtdb.firebaseio.com",
            storageBucket: "planning-with-ai-797ec.firebasestorage.app",
            messagingSenderId: "283439580292",
            appId: "1:283439580292:web:b566dc267bdb8861ca2ed1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. منطق التوجيه (Redirect)
        window.addEventListener('load', async () => {
            const query = window.location.search;
            if (query.startsWith('?')) {
                const slug = query.substring(1).split('&')[0];
                if (slug) {
                    document.getElementById('main-content').classList.add('hidden');
                    document.getElementById('redirect-screen').classList.remove('hidden');
                    try {
                        const snapshot = await get(child(ref(db), `links/${slug}`));
                        if (snapshot.exists()) {
                            window.location.replace(snapshot.val().target);
                        } else {
                            alert("الرابط غير موجود!");
                            window.location.href = window.location.origin + window.location.pathname;
                        }
                    } catch (e) {
                        window.location.href = window.location.origin + window.location.pathname;
                    }
                }
            }
        });

        // 2. منطق الاختصار
        const shortenBtn = document.getElementById('shortenBtn');

        shortenBtn.addEventListener('click', async () => {
            const originalUrl = document.getElementById('longUrl').value.trim();
            let customSlug = document.getElementById('customSlug').value.trim();

            if (!originalUrl) return alert("يرجى إدخال رابط!");

            shortenBtn.disabled = true;
            document.getElementById('btnText').innerText = "جاري الحفظ...";
            document.getElementById('btnLoader').classList.remove('hidden');

            try {
                let finalSlug = customSlug || Math.random().toString(36).substring(2, 8);
                
                // حل مشكلة التكرار تلقائياً بإضافة نقطة
                let isUnique = false;
                while (!isUnique) {
                    const check = await get(child(ref(db), `links/${finalSlug}`));
                    if (check.exists()) {
                        finalSlug += ".";
                    } else {
                        isUnique = true;
                    }
                }

                await set(ref(db, 'links/' + finalSlug), {
                    target: originalUrl,
                    createdAt: new Date().toISOString()
                });

                const finalLink = window.location.origin + window.location.pathname + "?" + finalSlug;
                document.getElementById('shortLink').innerText = finalLink;
                document.getElementById('shortLink').href = finalLink;
                document.getElementById('resultArea').classList.remove('hidden');

                // إنشاء الـ QR (بدون شعار ليكون المسح أسرع)
                const qrBox = document.getElementById("qrcode");
                qrBox.innerHTML = "";
                const qr = new QRCode(qrBox, {
                    text: finalLink,
                    width: 250,
                    height: 250,
                    colorDark : "#0f172a",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });

                // تفعيل التحميل
                setTimeout(() => {
                    const canvas = qrBox.querySelector('canvas');
                    if (canvas) {
                        document.getElementById('downloadBtn').onclick = () => {
                            const a = document.createElement('a');
                            a.href = canvas.toDataURL("image/png");
                            a.download = `QR_${finalSlug}.png`;
                            a.click();
                        };
                    }
                }, 300);

            } catch (e) {
                alert("خطأ في قاعدة البيانات!");
            } finally {
                shortenBtn.disabled = false;
                document.getElementById('btnText').innerText = "إنشاء الرابط و QR كود";
                document.getElementById('btnLoader').classList.add('hidden');
            }
        });
    </script>

    <script>
        function copyToClipboard() {
            const text = document.getElementById('shortLink').innerText;
            navigator.clipboard.writeText(text).then(() => alert("تم النسخ!"));
        }
    </script>
</body>
</html>
