<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط الاحترافي | elgoharyx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%); 
            min-height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
        }
        .glass-card { background: rgba(255, 255, 255, 0.98); }
        #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 12px; }
        canvas { display: block; margin: 0 auto; }
        .hexagon-img {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            display: block;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            object-fit: cover;
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.1));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .hexagon-img:hover {
            transform: scale(1.08) rotate(3deg);
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.2));
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div id="app" class="glass-card p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        
        <div id="main-content">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH5Tji4WfG5r2d_T0XAd2LBBNB28t2dhFqJAcbR5JSpyMqqNB6IbugiC2Vos-2smWIa3tMpA7kEHf3iMcHSsbmkZUw9I1AwP-ocTRnlzLDJWjCb8eH5m2cRXiWpIa-O6a1bOSdyB9hUg-FepVa9QPjTs8Co6nX0_GDnednjERDFmN1quZbkIbW5wQjh2I/s1024/103777.png" class="hexagon-img" alt="Logo">
            <h1 class="text-2xl font-black text-slate-800 mb-6">اختصار روابط/elgoharyX</h1>

            <div class="space-y-4">
                <input type="url" id="longUrl" placeholder="أدخل الرابط الطويل..." 
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-right outline-none focus:border-blue-500 transition-all">
                
                <input type="text" id="customSlug" placeholder="كلمة مميزة للرابط (مثال: promo)" 
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-right outline-none focus:border-blue-500 transition-all">

                <input type="text" id="logoUrl" placeholder="رابط صورة اللوجو للكود (اختياري)" 
                       class="w-full p-3 bg-slate-100 border-2 border-transparent rounded-xl text-left dir-ltr outline-none focus:border-blue-500 text-sm">

                <button id="shortenBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">
                    إنشاء وحميل QR تلقائياً
                </button>
            </div>

            <div id="resultArea" class="hidden mt-8 space-y-6">
                <div class="p-4 bg-blue-50 border border-blue-100 rounded-2xl">
                    <div class="bg-white p-3 rounded-xl border border-blue-200 shadow-inner flex items-center justify-between gap-2">
                        <a id="shortLink" href="#" target="_blank" class="text-blue-600 font-bold break-all text-sm underline flex-1 text-left"></a>
                        <button onclick="copyToClipboard()" class="text-xs bg-blue-600 text-white px-3 py-2 rounded-lg">نسخ</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <div id="qrcode"></div>
                    <button id="downloadBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md transition-all">
                        تحميل الصورة يدوياً
                    </button>
                </div>
            </div>
        </div>

        <div id="redirect-screen" class="hidden py-12 text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600 mx-auto"></div>
            <p class="mt-6 text-slate-800 font-bold text-lg">جاري توجيهك...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyDGhCAU7DLleD1KkCR6SQmvl8bpDncHJ8g",
            authDomain: "planning-with-ai-797ec.firebaseapp.com",
            projectId: "planning-with-ai-797ec",
            databaseURL: "https://planning-with-ai-797ec-default-rtdb.firebaseio.com",
            storageBucket: "planning-with-ai-797ec.firebasestorage.app",
            messagingSenderId: "283439580292",
            appId: "1:283439580292:web:b566dc267bdb8861ca2ed1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const shortenBtn = document.getElementById('shortenBtn');
        const qrcodeContainer = document.getElementById("qrcode");

        shortenBtn.addEventListener('click', async () => {
            const originalUrl = document.getElementById('longUrl').value.trim();
            const logoUrl = document.getElementById('logoUrl').value.trim();
            let slugInput = document.getElementById('customSlug').value.trim();

            if (!originalUrl) return alert("من فضلك أدخل الرابط!");

            // التعديل الجوهري: إنشاء ID فريد جداً يجمع بين الوقت الحالي واسم المستخدم
            // Date.now() يضمن أن كل ثانية لها ID مختلف تماماً
            const uniqueID = Date.now().toString(36); 
            const finalSlug = slugInput ? `${slugInput}_${uniqueID}` : uniqueID;

            try {
                // حفظ الرابط في قاعدة البيانات تحت المعرف الفريد الجديد
                await set(ref(db, 'links/' + finalSlug), { 
                    target: originalUrl,
                    createdAt: new Date().toISOString() 
                });

                const finalLink = window.location.origin + window.location.pathname + "?" + finalSlug;
                
                document.getElementById('shortLink').innerText = finalLink;
                document.getElementById('shortLink').href = finalLink;
                document.getElementById('resultArea').classList.remove('hidden');

                // إنشاء QR Code
                qrcodeContainer.innerHTML = "";
                const qr = new QRCode(qrcodeContainer, {
                    text: finalLink,
                    width: 280,
                    height: 280,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                // تفعيل التحميل التلقائي بعد رسم الكود واللوجو
                setTimeout(() => {
                    const canvas = qrcodeContainer.querySelector('canvas');
                    if (canvas) {
                        if (logoUrl) {
                            const ctx = canvas.getContext('2d');
                            const img = new Image();
                            img.crossOrigin = "anonymous";
                            img.src = logoUrl;
                            img.onload = () => {
                                const size = canvas.width * 0.22;
                                const x = (canvas.width - size) / 2;
                                const y = (canvas.height - size) / 2;
                                ctx.fillStyle = "white";
                                ctx.fillRect(x - 5, y - 5, size + 10, size + 10);
                                ctx.drawImage(img, x, y, size, size);
                                autoDownload(canvas, finalSlug);
                            };
                            img.onerror = () => autoDownload(canvas, finalSlug);
                        } else {
                            autoDownload(canvas, finalSlug);
                        }
                    }
                }, 700);

            } catch (e) { 
                console.error(e);
                alert("حدث خطأ أثناء الاتصال بقاعدة البيانات!"); 
            }
        });

        function autoDownload(canvas, filename) {
            const dataUrl = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = `QR_${filename}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // تحديث زر التحميل اليدوي في الصفحة
            document.getElementById('downloadBtn').onclick = () => {
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = `QR_${filename}.png`;
                a.click();
            };
        }

        // منطق إعادة التوجيه (Redirect)
        window.onload = async () => {
            const urlParams = window.location.search.substring(1);
            if (urlParams) {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('redirect-screen').classList.remove('hidden');
                
                try {
                    const snapshot = await get(child(ref(db), `links/${urlParams}`));
                    if (snapshot.exists()) {
                        window.location.replace(snapshot.val().target);
                    } else {
                        alert("هذا الرابط غير موجود أو تم حذفه.");
                        window.location.href = window.location.origin + window.location.pathname;
                    }
                } catch (e) {
                    window.location.href = window.location.origin + window.location.pathname;
                }
            }
        };
    </script>

    <script>
        function copyToClipboard() {
            const linkText = document.getElementById('shortLink').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                alert("تم نسخ الرابط بنجاح!");
            });
        }
    </script>
</body>
</html>
